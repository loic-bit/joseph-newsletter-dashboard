name: Newsletter Research

on:
  schedule:
    - cron: '0 14 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run research script
        env:
          JOSEPH_YT_API_KEY: ${{ secrets.JOSEPH_YT_API_KEY }}
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: python research.py

      - name: Commit updated research data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html dashboard-data.json
          git diff --staged --quiet || git commit -m "chore: refresh research data $(date -u +%Y-%m-%d)"
          git push
